components:
  responses:
    OK:
      description: Success
      content:
        application/json:
          schema: { type: object }
    Created:
      description: Created
      content:
        application/json:
          schema: { type: object }
    Accepted:
      description: Accepted (async job or approval request)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Accepted' }
    Error:
      description: Uniform error envelope (doc 04 s1.6)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
    CursorPage:
      type: object
      required: [items]
      properties:
        items: { type: array, items: { type: object } }
        next_cursor: { type: [string, 'null'] }
    Accepted:
      type: object
      properties:
        job_id: { type: string }
        approval_request_id: { type: string }
    Provider: { type: object, additionalProperties: true }
    ProviderKey: { type: object, additionalProperties: true }
    KeyPool: { type: object, additionalProperties: true }
    User: { type: object, additionalProperties: true }
    Session: { type: object, additionalProperties: true }
    ConfigVersion: { type: object, additionalProperties: true }
    Queue: { type: object, additionalProperties: true }
    Job: { type: object, additionalProperties: true }
    Worker: { type: object, additionalProperties: true }
    AlertRule: { type: object, additionalProperties: true }
    AlertChannel: { type: object, additionalProperties: true }
    AlertEvent: { type: object, additionalProperties: true }
    ApprovalRequest: { type: object, additionalProperties: true }
    Budget: { type: object, additionalProperties: true }
    Overview: { type: object, additionalProperties: true }
