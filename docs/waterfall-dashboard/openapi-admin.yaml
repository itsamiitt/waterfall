# Waterfall Dashboard Admin API (/v1/admin) - human-facing rendering.
# Machine-authoritative artifact: openapi-admin.json (parsed by internal/dash/apispec/parity_test.go).
# Both files are generated from one route table and share an identical path set.
openapi: 3.0.3
